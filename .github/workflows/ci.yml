name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }} / WC ${{ matrix.wc }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest supported combo
          - php: '7.4'
            wp: '6.2'
            wc: '8.3.0'
          # Mid-range
          - php: '8.1'
            wp: '6.6'
            wc: '9.4.0'
          # Current stable
          - php: '8.2'
            wp: 'latest'
            wc: 'latest'
          # Latest PHP versions against latest WP/WC
          - php: '8.3'
            wp: 'latest'
            wc: 'latest'
          - php: '8.4'
            wp: 'latest'
            wc: 'latest'

    services:
      database:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: mysql
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install WooCommerce
        run: |
          if [ "${{ matrix.wc }}" = "latest" ]; then
            WC_VERSION=$(curl -s https://api.wordpress.org/plugins/info/1.0/woocommerce.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          else
            WC_VERSION="${{ matrix.wc }}"
          fi
          echo "Installing WooCommerce ${WC_VERSION}"
          mkdir -p /tmp/woocommerce
          curl -sL "https://downloads.wordpress.org/plugin/woocommerce.${WC_VERSION}.zip" -o /tmp/woocommerce.zip
          unzip -q /tmp/woocommerce.zip -d /tmp/
          echo "WC_PATH=/tmp/woocommerce" >> $GITHUB_ENV

      - name: Install SVN
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WordPress test suite
        run: ./tests/bin/install.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }}

      - name: Run tests
        env:
          WC_PATH: ${{ env.WC_PATH }}
        run: vendor/bin/phpunit
